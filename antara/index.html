<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C1A17">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Antara · your inner ops room</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg1:#10231F; --bg2:#0C1A17; --ink:#E9E4D8; --ink-dim:#9DB8A9; --ink-faint:#6E8A7B;
    --card:rgba(233,228,216,0.05); --line:rgba(233,228,216,0.10);
    --amber:#E8A24C; --green:#5FBF8A; --gold:#D9B44A; --violet:#A98BE0;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:linear-gradient(175deg,var(--bg1),var(--bg2) 55%,#0A1513);
    color:var(--ink);font-family:'Avenir Next','Segoe UI',system-ui,sans-serif;padding-bottom:90px}
  header{padding:28px 20px 10px;max-width:720px;margin:0 auto}
  h1.brand{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-size:34px;letter-spacing:.04em;margin:0;color:#F3EDDD}
  .greeting{font-size:14px;color:var(--ink-dim);margin:6px 0 2px}
  .tagline{font-size:13px;font-style:italic;color:var(--ink-faint);margin:0}
  main{max-width:720px;margin:0 auto;padding:14px 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  h2{font-family:'Palatino Linotype',Palatino,Georgia,serif;font-size:19px;margin:0 0 10px;color:#F3EDDD}
  input,textarea{width:100%;background:rgba(0,0,0,.28);border:1px solid rgba(233,228,216,.15);border-radius:10px;
    color:var(--ink);padding:11px 12px;font-size:15px;outline:none;font-family:inherit}
  textarea{min-height:90px;resize:vertical}
  .btn{background:var(--amber);color:#1A130A;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}
  .ghost{background:transparent;color:var(--ink-dim);border:1px solid rgba(157,184,169,.35);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid}
  .small{font-size:12px;color:var(--ink-faint)}
  pre{white-space:pre-wrap;font-size:14px;line-height:1.55;color:#D8D2C2;margin:0;font-family:inherit}
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,20,17,.95);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:10px 4px calc(10px + env(safe-area-inset-bottom));backdrop-filter:blur(8px)}
  nav button{background:none;border:none;color:#7E9488;font-size:11px;font-weight:500;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 6px}
  nav button.active{color:var(--amber);font-weight:700}
  nav button span{font-size:18px}
  .task-row{display:flex;align-items:center;gap:10px;padding:7px 0}
  .check{width:22px;height:22px;border-radius:7px;cursor:pointer;border:2px solid;background:transparent;
    color:#14100A;font-size:13px;font-weight:800;flex-shrink:0}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--amber);color:#1A130A;
    padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;z-index:50;display:none}
  .reflect{margin-top:10px;padding:10px;background:rgba(169,139,224,.16);border-radius:10px}
  .idea-card{border-left:3px solid}
</style>
</head>
<body>
<header>
  <h1 class="brand">Antara</h1>
  <p class="greeting" id="greeting"></p>
  <p class="tagline" id="tagline"></p>
</header>
<main id="main"></main>
<div class="toast" id="toast"></div>
<nav id="nav"></nav>

<script>
// ————— Antara · standalone edition —————
// Data lives in this browser via localStorage. Export regularly from Settings.

const DOMAINS = {
  personal:{label:"Personal",color:"#E8A24C",soft:"rgba(232,162,76,.14)"},
  health:{label:"Health",color:"#5FBF8A",soft:"rgba(95,191,138,.14)"},
  wealth:{label:"Wealth",color:"#D9B44A",soft:"rgba(217,180,74,.14)"},
  spiritual:{label:"Spiritual",color:"#A98BE0",soft:"rgba(169,139,224,.16)"},
};
const SADHANA=["Shakti Chalana Kriya","Shoonya Meditation","Angamardana","Surya Shakti","YSS Lesson / Study","Chanting"];
const MOODS=["😌","😊","🔥","😐","😩","🌊"];
const TAGLINES=[
  "The mind is a fine servant and a terrible boss. Let's file some paperwork on it.",
  "Rome wasn't built in a day, but they were logging events hourly.",
  "Your future self called. He wants receipts.",
  "Discipline is just remembering what you actually want.",
  "Small entries. Compound interest. Same math as wealth.",
  "The breath doesn't need a reminder app. You, however…"];

let data = load();
let tab = "today";
let aiBusy = false;

function load(){
  try{ return Object.assign({tasks:[],journal:[],events:[],prompts:[],ideas:[],sadhana:{},plan:{},settings:{aiUrl:""}}, JSON.parse(localStorage.getItem("antara")||"{}")); }
  catch(e){ return {tasks:[],journal:[],events:[],prompts:[],ideas:[],sadhana:{},plan:{},settings:{aiUrl:""}}; }
}
function save(){ localStorage.setItem("antara", JSON.stringify(data)); }
function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function flash(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",2200); }

function greeting(){
  const h=new Date().getHours();
  if(h<4)return"Brahma muhurta approaches. The ambitious hour.";
  if(h<6)return"Brahma muhurta. The universe is quiet. Perfect.";
  if(h<12)return"Good morning. The day is still negotiable.";
  if(h<17)return"Good afternoon. Momentum check.";
  if(h<21)return"Good evening. Time to close the loops.";
  return"Late hours. Log it, then sleep — that's an order.";
}

async function askAI(prompt, maxTokens){
  // Uses the built-in /api/ai serverless proxy (NVIDIA NIM) by default.
  // A custom endpoint from ⚙️ Setup overrides it.
  const url = (data.settings.aiUrl||"").trim() || "/api/ai";
  const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:prompt,max_tokens:maxTokens||1000})});
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  return j.text || "";
}

function sadhanaStreak(){
  let streak=0; const d=new Date();
  for(let i=0;i<365;i++){
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const day=data.sadhana[key];
    if(day&&Object.values(day).some(Boolean)){streak++;d.setDate(d.getDate()-1);}
    else{ if(i===0){d.setDate(d.getDate()-1);continue;} break; }
  }
  return streak;
}

// ————— renderers —————
function render(){
  document.getElementById("greeting").textContent=greeting();
  const main=document.getElementById("main");
  if(tab==="today")main.innerHTML=renderToday();
  else if(tab==="journal")main.innerHTML=renderJournal();
  else if(tab==="tasks")main.innerHTML=renderTasks();
  else if(tab==="log")main.innerHTML=renderLog();
  else if(tab==="ideas")main.innerHTML=renderIdeas();
  else if(tab==="prompts")main.innerHTML=renderPrompts();
  else if(tab==="settings")main.innerHTML=renderSettings();
  renderNav();
}

function chipStyle(dom,active){
  const c=DOMAINS[dom];
  return `background:${active?c.color:c.soft};color:${active?"#14100A":c.color};border-color:${c.color}55`;
}

function renderToday(){
  const tKey=todayKey(); const day=data.sadhana[tKey]||{};
  const done=Object.values(day).filter(Boolean).length;
  const open=data.tasks.filter(t=>!t.done);
  let h=`<div class="card"><h2>Sadhana · today</h2>
    <p class="small">${done}/${SADHANA.length} done · streak ${sadhanaStreak()} days${done===SADHANA.length?" · full house 🙏":""}</p>
    <div class="chips">`;
  SADHANA.forEach(item=>{
    h+=`<button class="chip" style="${chipStyle('spiritual',!!day[item])}" onclick="toggleSadhana('${esc(item)}')">${day[item]?"✓ ":""}${esc(item)}</button>`;
  });
  h+=`</div></div>
  <div class="card"><h2>Optimize my day</h2>
    <p class="small">The AI reads your open tasks, sadhana status, and latest mood — then builds a prioritized plan across Personal · Health · Wealth · Spiritual.</p>
    <textarea id="planInstruction" style="min-height:70px;margin-top:10px" placeholder="Your instruction (optional) — e.g., 'Night shift today, plan 2pm-10pm', 'Focus only on Jeevani launch'…"></textarea>
    <button class="btn" onclick="optimizeDay()" ${aiBusy?"disabled":""}>${aiBusy?"Consulting the oracle…":"⚡ Optimize & prioritize"}</button>
    ${data.plan[tKey]?`<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px"><pre>${esc(data.plan[tKey])}</pre></div>`:""}
  </div>
  <div class="card"><h2>Open loops</h2>`;
  if(!open.length) h+=`<p class="small">Zero open tasks. Either you're enlightened or you forgot to add them.</p>`;
  else open.slice(0,5).forEach(t=>{
    h+=`<div class="task-row"><span style="width:8px;height:8px;border-radius:999px;background:${DOMAINS[t.domain].color};flex-shrink:0"></span><span style="font-size:14px">${esc(t.text)}</span></div>`;
  });
  return h+"</div>";
}

function renderJournal(){
  let h=`<div class="card"><h2>New entry</h2><div class="chips" id="moodRow">`;
  MOODS.forEach((m,i)=>{ h+=`<button class="chip" data-mood="${m}" style="font-size:20px;background:${i===0?"rgba(232,162,76,.25)":"transparent"};border-color:rgba(233,228,216,.2);color:var(--ink)" onclick="pickMood(this)">${m}</button>`; });
  h+=`</div><textarea id="journalText" style="min-height:110px" placeholder="What's actually going on? Be honest — this notebook doesn't gossip."></textarea>
  <button class="btn" onclick="addJournal()">Save entry</button></div>`;
  data.journal.forEach(j=>{
    h+=`<div class="card"><p class="small">${j.mood} · ${esc(j.date)}</p><pre style="margin-top:6px">${esc(j.text)}</pre>`;
    if(j.reflection) h+=`<div class="reflect"><p class="small" style="color:#A98BE0;margin:0 0 4px">Reflection</p><pre style="font-size:13px">${esc(j.reflection)}</pre></div>`;
    else h+=`<button class="ghost" style="margin-top:10px" onclick="reflect(${j.id})">✨ Reflect on this</button>`;
    h+="</div>";
  });
  if(!data.journal.length) h+=`<p class="small" style="text-align:center;padding:20px">An empty journal is just a full life waiting to be noticed.</p>`;
  return h;
}

function renderTasks(){
  let h=`<div class="card"><h2>Add a task</h2>
  <input id="taskText" placeholder="e.g., Record TinyFin episode, review ESD punch list…" onkeydown="if(event.key==='Enter')addTask()">
  <div class="chips" id="domRow">`;
  Object.keys(DOMAINS).forEach((d,i)=>{ h+=`<button class="chip" data-dom="${d}" style="${chipStyle(d,i===0)}" onclick="pickDomain(this)">${DOMAINS[d].label}</button>`; });
  h+=`</div><button class="btn" style="margin-top:0" onclick="addTask()">Add task</button></div>`;
  Object.keys(DOMAINS).forEach(dom=>{
    const list=data.tasks.filter(t=>t.domain===dom);
    if(!list.length)return;
    h+=`<div class="card"><h2 style="color:${DOMAINS[dom].color};font-size:16px">${DOMAINS[dom].label}</h2>`;
    list.forEach(t=>{
      h+=`<div class="task-row">
        <button class="check" style="border-color:${DOMAINS[dom].color};background:${t.done?DOMAINS[dom].color:"transparent"}" onclick="toggleTask(${t.id})">${t.done?"✓":""}</button>
        <span style="font-size:14px;flex:1;${t.done?"text-decoration:line-through;opacity:.5":""}">${esc(t.text)}</span>
        <button class="ghost" style="padding:3px 9px;font-size:12px" onclick="delTask(${t.id})">✕</button></div>`;
    });
    h+="</div>";
  });
  if(!data.tasks.length) h+=`<p class="small" style="text-align:center;padding:20px">No tasks yet. Suspiciously peaceful.</p>`;
  return h;
}

function renderLog(){
  let h=`<div class="card"><h2>Event log</h2><p class="small">One-tap timestamps. Anything worth remembering.</p>
  <input id="eventText" style="margin-top:10px" placeholder="What just happened?" onkeydown="if(event.key==='Enter')addEvent()">
  <button class="btn" onclick="addEvent()">Log it</button></div>`;
  data.events.forEach(ev=>{ h+=`<div class="card" style="padding:12px 16px"><p class="small">${esc(ev.time)}</p><p style="margin:4px 0 0;font-size:14px">${esc(ev.text)}</p></div>`; });
  return h;
}

function renderIdeas(){
  let h=`<div class="card"><h2>Idea catcher</h2><p class="small">Niches, business sparks, video concepts. Capture in five seconds, evaluate later.</p>
  <input id="ideaText" style="margin-top:10px" placeholder="e.g., Shorts series: 60-sec aquascape transformations…" onkeydown="if(event.key==='Enter')addIdea()">
  <div class="chips" id="ideaDomRow">`;
  Object.keys(DOMAINS).forEach(d=>{ h+=`<button class="chip" data-dom="${d}" style="${chipStyle(d,d==='wealth')}" onclick="pickIdeaDomain(this)">${DOMAINS[d].label}</button>`; });
  h+=`</div><button class="btn" style="margin-top:0" onclick="addIdea()">Catch it</button></div>`;
  data.ideas.forEach(idea=>{
    h+=`<div class="card idea-card" style="border-left-color:${DOMAINS[idea.category].color}">
      <p class="small">${DOMAINS[idea.category].label} · ${esc(idea.time)}</p>
      <p style="margin:5px 0 0;font-size:14px;line-height:1.5">${esc(idea.text)}</p>
      <button class="ghost" style="margin-top:8px;padding:3px 9px;font-size:12px" onclick="delIdea(${idea.id})">Discard</button></div>`;
  });
  if(!data.ideas.length) h+=`<p class="small" style="text-align:center;padding:20px">Ideas arrive unannounced and leave without notice. This is the guest register.</p>`;
  return h;
}

function renderPrompts(){
  let h=`<div class="card"><h2>Prompt vault</h2>
  <input id="promptTitle" placeholder="Title (e.g., KPI writeup — 25-word style)">
  <textarea id="promptBody" style="margin-top:8px" placeholder="The prompt itself…"></textarea>
  <button class="btn" onclick="addPrompt()">Save prompt</button></div>`;
  data.prompts.forEach(p=>{
    h+=`<div class="card"><h2 style="font-size:16px">${esc(p.title)}</h2><pre style="font-size:13px">${esc(p.body)}</pre>
    <button class="ghost" style="margin-top:10px" onclick="copyPrompt(${p.id})">Copy</button></div>`;
  });
  if(!data.prompts.length) h+=`<p class="small" style="text-align:center;padding:20px">Great prompts are hard-won. Vault them here before they vanish.</p>`;
  return h;
}

function renderSettings(){
  return `<div class="card"><h2>AI endpoint</h2>
    <p class="small">AI features work out of the box via the built-in /api/ai proxy (NVIDIA NIM — free). Only fill this if you want to override with a different endpoint.</p>
    <input id="aiUrl" style="margin-top:10px" placeholder="(optional) custom endpoint URL" value="${esc(data.settings.aiUrl||"")}">
    <button class="btn" onclick="saveSettings()">Save</button></div>
  <div class="card"><h2>Backup</h2>
    <p class="small">Your data lives only in this browser. Export a backup file now and then — future you insists.</p>
    <button class="btn" onclick="exportData()">⬇ Export backup (JSON)</button>
    <p class="small" style="margin-top:14px">Restore from backup:</p>
    <input type="file" id="importFile" accept=".json" style="margin-top:6px" onchange="importData(this)">
  </div>`;
}

function renderNav(){
  const tabs=[["today","☀️","Today"],["journal","📓","Journal"],["tasks","✅","Tasks"],["log","🕰️","Log"],["ideas","💡","Ideas"],["prompts","🧠","Prompts"],["settings","⚙️","Setup"]];
  document.getElementById("nav").innerHTML=tabs.map(([k,i,l])=>
    `<button class="${tab===k?"active":""}" onclick="setTab('${k}')"><span>${i}</span>${l}</button>`).join("");
}

// ————— actions —————
let currentMood="😌", currentDomain="personal", currentIdeaDomain="wealth";
function setTab(t){tab=t;render();}
function pickMood(el){currentMood=el.dataset.mood;document.querySelectorAll("#moodRow .chip").forEach(b=>b.style.background="transparent");el.style.background="rgba(232,162,76,.25)";}
function pickDomain(el){currentDomain=el.dataset.dom;document.querySelectorAll("#domRow .chip").forEach(b=>b.setAttribute("style",chipStyle(b.dataset.dom,false)));el.setAttribute("style",chipStyle(el.dataset.dom,true));}
function pickIdeaDomain(el){currentIdeaDomain=el.dataset.dom;document.querySelectorAll("#ideaDomRow .chip").forEach(b=>b.setAttribute("style",chipStyle(b.dataset.dom,false)));el.setAttribute("style",chipStyle(el.dataset.dom,true));}
function toggleSadhana(item){const k=todayKey();const day=Object.assign({},data.sadhana[k]||{});day[item]=!day[item];data.sadhana[k]=day;save();render();}
function addTask(){const v=document.getElementById("taskText").value;if(!v.trim())return;data.tasks.unshift({id:Date.now(),text:v.trim(),domain:currentDomain,done:false});save();render();}
function toggleTask(id){data.tasks=data.tasks.map(t=>t.id===id?Object.assign({},t,{done:!t.done}):t);save();render();}
function delTask(id){data.tasks=data.tasks.filter(t=>t.id!==id);save();render();}
function addJournal(){const v=document.getElementById("journalText").value;if(!v.trim())return;data.journal.unshift({id:Date.now(),text:v.trim(),mood:currentMood,date:new Date().toLocaleString(),reflection:""});save();render();flash("Entry saved. Your future self thanks you.");}
function addEvent(){const v=document.getElementById("eventText").value;if(!v.trim())return;data.events.unshift({id:Date.now(),text:v.trim(),time:new Date().toLocaleString()});save();render();flash("Logged.");}
function addIdea(){const v=document.getElementById("ideaText").value;if(!v.trim())return;data.ideas.unshift({id:Date.now(),text:v.trim(),category:currentIdeaDomain,time:new Date().toLocaleString()});save();render();flash("Idea caught. They're slippery — good reflexes.");}
function delIdea(id){data.ideas=data.ideas.filter(i=>i.id!==id);save();render();}
function addPrompt(){const t=document.getElementById("promptTitle").value,b=document.getElementById("promptBody").value;if(!t.trim()||!b.trim())return;data.prompts.unshift({id:Date.now(),title:t.trim(),body:b.trim()});save();render();flash("Prompt vaulted.");}
function copyPrompt(id){const p=data.prompts.find(x=>x.id===id);if(p){navigator.clipboard.writeText(p.body);flash("Copied to clipboard.");}}
function saveSettings(){data.settings.aiUrl=document.getElementById("aiUrl").value.trim();save();flash("Saved.");}

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="antara-backup-"+todayKey()+".json";a.click();
}
function importData(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{data=Object.assign(load(),JSON.parse(r.result));save();render();flash("Backup restored.");}catch(e){flash("That file didn't parse. Wrong file?");}};
  r.readAsText(f);
}

async function optimizeDay(){
  const instruction=document.getElementById("planInstruction").value;
  const tKey=todayKey();const day=data.sadhana[tKey]||{};
  const open=data.tasks.filter(t=>!t.done);
  aiBusy=true;render();
  try{
    const prompt=`You are the witty but wise planning assistant inside a personal life-OS app. The user balances four life domains: Personal, Health, Wealth, Spiritual (yoga, meditation, kriya practice).

USER'S INSTRUCTION FOR TODAY (highest priority): ${instruction&&instruction.trim()?instruction.trim():"No special instruction — balance all four domains sensibly."}

Today's date: ${new Date().toDateString()}.
Open tasks: ${open.length?open.map(t=>"["+DOMAINS[t.domain].label+"] "+t.text).join("; "):"none listed"}.
Sadhana done today: ${Object.keys(day).filter(k=>day[k]).join(", ")||"nothing yet"}.
Recent journal mood: ${data.journal[0]?data.journal[0].mood+" — "+data.journal[0].text.slice(0,200):"no recent entry"}.

Create an optimized, prioritized plan for the rest of today. Time-blocked list plus 2-3 sentences of sharp, encouraging commentary. Light wit welcome. Plain text only, no markdown symbols.`;
    const out=await askAI(prompt,1200);
    data.plan[tKey]=out;save();
  }catch(e){
    flash("The oracle is offline: "+String(e.message).slice(0,60));
  }
  aiBusy=false;render();
}

async function reflect(id){
  const entry=data.journal.find(j=>j.id===id);if(!entry)return;
  aiBusy=true;
  try{
    const out=await askAI(`You are a thoughtful journaling companion with a light sense of humor, versed in yogic wisdom (but never preachy). Read this journal entry and respond with a short reflection: one genuine observation, one gentle question worth sitting with. 3-4 sentences max. Plain text, no markdown.

Mood: ${entry.mood}
Entry: ${entry.text}`,500);
    entry.reflection=out;save();render();
  }catch(e){
    flash("Reflection failed — "+String(e.message).slice(0,60));
  }
  aiBusy=false;
}

// ————— boot —————
document.getElementById("tagline").textContent=TAGLINES[Math.floor(Math.random()*TAGLINES.length)];
render();
</script>
</body>
</html>
